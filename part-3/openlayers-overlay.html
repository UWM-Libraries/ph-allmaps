<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paris 1300 Road Network Overlay with OpenLayers</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/ol@10.6.1/ol.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/ol@10.6.1/dist/ol.js"></script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family: sans-serif;
      }

      main {
        width: 100%;
        height: 100%;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      #map {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <main aria-labelledby="page-title">
      <h1 id="page-title" class="sr-only">
        Paris 1300 road network on an 1821 Paris map
      </h1>
      <p id="map-description" class="sr-only">
        Interactive map showing an 1821 historical map of Paris with an overlay
        of the reconstructed road network for Paris in 1300. Use standard map
        pan and zoom interactions to explore the overlay.
      </p>
      <div
        id="map"
        role="img"
        aria-label="1821 Paris map with 1300 road network overlay"
        aria-describedby="map-description"
      ></div>
    </main>

    <script>
      const width = 10784;
      const height = 6941;
      const extent = [0, 0, width, height];
      const iiifImageUrl =
        "https://cdm17272.contentdm.oclc.org/iiif/2/agdm:1550/full/full/0/default.jpg";

      const projection = new ol.proj.Projection({
        code: "paris-image-pixels",
        units: "pixels",
        extent
      });

      async function createOverlayUrl() {
        const svgText = await fetch("./voiries1300_2009.svg").then(
          (response) => response.text()
        );

        const styledSvg = svgText.replace(
          "<svg xmlns=\"http://www.w3.org/2000/svg\">",
          `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}">
  <style>
    polyline {
      fill: none;
      stroke: #00FFFF;
      stroke-opacity: 1.0;
      stroke-width: 10;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }
  </style>`
        );

        return URL.createObjectURL(
          new Blob([styledSvg], { type: "image/svg+xml" })
        );
      }

      async function main() {
        const overlayUrl = await createOverlayUrl();

        new ol.Map({
          target: "map",
          layers: [
            new ol.layer.Image({
              source: new ol.source.ImageStatic({
                url: iiifImageUrl,
                imageExtent: extent,
                projection
              })
            }),
            new ol.layer.Image({
              opacity: 1.0,
              source: new ol.source.ImageStatic({
                url: overlayUrl,
                imageExtent: extent,
                projection
              })
            })
          ],
          view: new ol.View({
            projection,
            center: ol.extent.getCenter(extent),
            zoom: 4,
            maxZoom: 8,
            extent,
            showFullExtent: true
          })
        });

        window.addEventListener("beforeunload", () => {
          URL.revokeObjectURL(overlayUrl);
        });
      }

      main().catch((error) => {
        console.error(error);
      });
    </script>
  </body>
</html>
